
</head>
<body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bakra Eid 2026 Countdown</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      overflow:hidden;
      color:white;
    }

    .container{
      width:90%;
      max-width:900px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius:25px;
      padding:30px;
      text-align:center;
      box-shadow:0 0 30px rgba(0,0,0,0.4);
      position:relative;
    }

    h1{
      font-size:45px;
      margin-bottom:15px;
      color:#ffd369;
      text-shadow:0 0 15px rgba(255,211,105,0.7);
    }

    .subtitle{
      margin-bottom:25px;
      font-size:18px;
      color:#eee;
    }

    .eid-image{
      width:260px;
      margin:20px auto;
      display:block;
      border-radius:20px;
      border:4px solid #ffd369;
      box-shadow:0 0 25px rgba(255,211,105,0.5);
    }

    .countdown{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:25px;
    }

    .time-box{
      background: rgba(255,255,255,0.12);
      padding:25px;
      width:150px;
      border-radius:20px;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.2);
    }

    .time-box:hover{
      transform:translateY(-8px);
      background: rgba(255,255,255,0.18);
    }

    .time{
      font-size:48px;
      font-weight:bold;
      color:#ffd369;
    }

    .label{
      margin-top:10px;
      font-size:20px;
      letter-spacing:1px;
    }

    .footer{
      margin-top:30px;
      font-size:16px;
      color:#ddd;
    }

    @media(max-width:700px){
      .time-box{
        width:120px;
        padding:20px;
      }

      .time{
        font-size:38px;
      }

      h1{
        font-size:34px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🐐 Bakra Eid 2026 Countdown</h1>

    <p class="subtitle">
      Countdown to Eid ul Adha 2026
    </p>

    <!-- Bakra Eid Image -->
    <img
      class="eid-image"
      src="https://images.unsplash.com/photo-1516466723877-e4ec1d736c8a?q=80&w=1200&auto=format&fit=crop"
      alt="Bakra Eid"
    >

    <!-- Countdown -->
    <div class="countdown">

      <div class="time-box">
        <div id="days" class="time">0</div>
        <div class="label">Days</div>
      </div>

      <div class="time-box">
        <div id="hours" class="time">0</div>
        <div class="label">Hours</div>
      </div>

      <div class="time-box">
        <div id="minutes" class="time">0</div>
        <div class="label">Minutes</div>
      </div>

      <div class="time-box">
        <div id="seconds" class="time">0</div>
        <div class="label">Seconds</div>
      </div>

    </div>

    <div class="footer">
      🌙 Eid Mubarak in Advance 🌙
    </div>

  </div>

  <script>

    // Approximate Bakra Eid 2026 Date
    // You can change it if official moon sighting differs
    const eidDate = new Date("May 27, 2026 00:00:00").getTime();

    function updateCountdown(){

      const now = new Date().getTime();

      const distance = eidDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));

      const hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24))
        / (1000 * 60 * 60)
      );

      const minutes = Math.floor(
        (distance % (1000 * 60 * 60))
        / (1000 * 60)
      );

      const seconds = Math.floor(
        (distance % (1000 * 60))
        / 1000
      );

      document.getElementById("days").innerHTML = days;
      document.getElementById("hours").innerHTML = hours;
      document.getElementById("minutes").innerHTML = minutes;
      document.getElementById("seconds").innerHTML = seconds;

      // If countdown finished
      if(distance < 0){

        clearInterval(interval);

        document.querySelector(".countdown").innerHTML =
          "<h2>🎉 Eid ul Adha Mubarak 🎉</h2>";
      }
    }

    updateCountdown();

    const interval = setInterval(updateCountdown, 1000);

  </script>

</body>
</html>






    
<script src="script.js"></script>    
</body>
</html>
